services:
  db:
    build:
      context: .
      dockerfile: ./postgresql/Dockerfile.db
      args:
        POSTGRES_USER: "prod_username"
        POSTGRES_PASSWORD: "prod_password"
        POSTGRES_DB: "to_de_olho_prod"
    environment:
      POSTGRES_USER: "prod_username"
      POSTGRES_PASSWORD: "prod_password"
      POSTGRES_DB: "to_de_olho_prod"
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d to_de_olho_prod -U prod_username"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  api:
    build:
      context: ./api-go
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: "prod_username"
      DB_PASSWORD: "prod_password"
      DB_DATABASE: "to_de_olho_prod"
      BROKER_URL: "amqp://to-de-olho:olho-de-to@broker"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./api-go:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://api:3000/api/v1/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  validate-user-worker:
    build:
      context: ./validate-user-worker
      dockerfile: Dockerfile
    environment:
      BROKER_URL: "amqp://to-de-olho:olho-de-to@broker"
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: "prod_username"
      DB_PASSWORD: "prod_password"
      DB_DATABASE: "to_de_olho_prod"
    depends_on:
      broker:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    command: ["/app/validate-user-worker"]

  crawlers:
    build:
      context: .
      dockerfile: ./crawlers/Dockerfile
    environment:
      WORKER_COUNT: 4
      BROKER_URL: "amqp://to-de-olho:olho-de-to@broker"
    depends_on:
      api:
        condition: service_healthy
      broker:
        condition: service_healthy
    volumes:
      - ./crawlers:/app/crawlers
      - shared_data:/shared_data
      - crawlers_cache:/app/crawlers/node_modules
    restart: unless-stopped
    command: ["/bin/bash", "/app/crawlers/run-crawlers.sh"]

  json-processor:
    build:
      context: ./json-processor-go
      dockerfile: Dockerfile
    environment:
      BROKER_URL: "amqp://to-de-olho:olho-de-to@broker"
    depends_on:
      api:
        condition: service_healthy
      broker:
        condition: service_healthy
    volumes:
      - shared_data:/shared_data
    restart: unless-stopped

  broker:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: to-de-olho
      RABBITMQ_DEFAULT_PASS: olho-de-to
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
  shared_data:
  crawlers_cache:
